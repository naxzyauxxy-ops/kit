name: Build Plugin

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    # This section specifically kills the "Node.js 20 deprecated" warning
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21' # Paper 1.20.4+ runs best on Java 21
          cache: 'maven'

      - name: Build Plugin
        # 'clean' helps prevent old errors from sticking around
        run: mvn -B clean package
