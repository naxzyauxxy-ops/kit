name: Build Plugin

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    # This environment variable clears the Node.js 20 warning
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21' # I recommend 21 for modern plugins
          cache: 'maven'

      - name: Build Plugin
        run: mvn -B package
