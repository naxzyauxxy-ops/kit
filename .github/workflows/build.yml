name: Build Plugin

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    # This environment variable explicitly opts into Node 24 
    # to clear the deprecation warning you are seeing.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          # Updated to 21 to support modern Minecraft (1.20.5+)
          java-version: '21' 
          cache: 'maven'

      - name: Build Plugin
        # Using 'clean' ensures no old files interfere with the build
        run: mvn -B clean package
